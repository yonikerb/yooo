<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>החתונה שלנו</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #d4af37; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; }
        body {
            font-family: 'Assistant', sans-serif;
            margin: 0; padding: 0; background-color: var(--bg); color: white;
            overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh;
        }

        /* מסך כניסה */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 5000; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        #login-overlay input {
            padding: 15px; border-radius: 10px; border: 1px solid var(--gold);
            background: #111; color: white; margin: 10px; width: 250px; text-align: center; font-size: 1rem;
        }
        #login-overlay button {
            padding: 12px 35px; background: var(--gold); border: none; border-radius: 25px;
            font-weight: bold; cursor: pointer; transition: 0.3s; color: black;
        }

        /* סרט פילם */
        .film-strip {
            width: 100%; background: #000; padding: 20px 0;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            position: relative; z-index: 5; overflow: hidden;
            -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
        }
        .film-track { display: flex; width: max-content; animation: slide 40s linear infinite; }
        .frame { width: 220px; height: 150px; margin: 0 10px; flex-shrink: 0; border-radius: 4px; overflow: hidden; border: 1px solid rgba(212, 175, 55, 0.2); }
        .frame img { width: 100%; height: 100%; object-fit: cover; }
        @keyframes slide { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* תוכן מרכזי */
        .main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; z-index: 10; }
        .hebrew-title { font-size: clamp(2.5rem, 10vw, 5rem); color: var(--gold); margin: 10px 0; font-weight: 700; }
        
        /* מונה זמן */
        .counter-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 25px 0; }
        .unit { text-align: center; min-width: 70px; padding: 15px 5px; background: var(--glass); border-radius: 12px; border: 1px solid rgba(212, 175, 55, 0.1); }
        .unit .val { font-size: 1.8rem; font-weight: 700; display: block; color: white; }
        .unit .lbl { font-size: 0.7rem; color: var(--gold); font-weight: bold; }

        /* כפתור העלאה בתחתית */
        .upload-section { padding: 30px; z-index: 20; text-align: center; background: linear-gradient(transparent, #000); }
        .upload-btn {
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 12px 25px; border-radius: 30px; cursor: pointer; font-weight: bold;
            transition: 0.3s; font-size: 0.9rem;
        }
        .upload-btn:hover { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold); }
        .upload-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #stars-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.4; animation: twinkle 3s infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h2 style="color:var(--gold); margin-bottom: 20px;">שלום, הכניסו קוד כניסה</h2>
        <input type="text" id="login-code" placeholder="הקוד שלכם">
        <button onclick="checkCode()">כניסה לאתר</button>
    </div>

    <div id="stars-layer"></div>

    <div id="main-content" style="display:none;">
        <div class="film-strip">
            <div class="film-track" id="track"></div>
        </div>

        <div class="main">
            <div id="greeting-text" style="color:var(--gold); font-weight: bold; letter-spacing: 2px; margin-bottom: 10px;"></div>
            <h1 id="wedding-names" class="hebrew-title">טוען שמות...</h1>
            <div id="wedding-date-display" style="color: rgba(212,175,55,0.7); font-family: 'Playfair Display'; font-size: 1.3rem;"></div>
            
            <div class="counter-grid">
                <div class="unit"><span class="val" id="m-val">0</span><span class="lbl">חודשים</span></div>
                <div class="unit"><span class="val" id="d-val">0</span><span class="lbl">ימים</span></div>
                <div class="unit"><span class="val" id="h-val">0</span><span class="lbl">שעות</span></div>
                <div class="unit"><span class="val" id="min-val">0</span><span class="lbl">דקות</span></div>
                <div class="unit"><span class="val" id="sec-val">0</span><span class="lbl">שניות</span></div>
            </div>

            <div style="width: 280px; height: 5px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 10px;">
                <div id="progress-bar" style="height: 100%; width: 0%; background: var(--gold); transition: 0.5s; box-shadow: 0 0 10px var(--gold);"></div>
            </div>
            <div id="percent-text" style="font-size: 0.75rem; color: #888; margin-top: 10px;"></div>
        </div>

        <div class="upload-section">
            <button class="upload-btn" id="upload-btn" onclick="document.getElementById('file-input').click()">
                + הוספת תמונה לגלריה שלכם
            </button>
            <input type="file" id="file-input" style="display:none" accept="image/*" onchange="uploadToImgBB(this)">
            <div id="upload-status" style="font-size: 0.8rem; margin-top: 10px; color: var(--gold); min-height: 20px;"></div>
        </div>
    </div>

    <script>
        // 1. הגדרות Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBIhLeaQnJ1HMxnEL0S4CLfMNyY7cfEfeA",
            authDomain: "chatunot-b63ec.firebaseapp.com",
            projectId: "chatunot-b63ec",
            storageBucket: "chatunot-b63ec.firebasestorage.app",
            messagingSenderId: "1057494918141",
            appId: "1:1057494918141:web:6d03f8007c894e463a6f94"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 2. הגדרות ImgBB
        const IMGBB_API_KEY = "f72aea59829f2a6501c518e83e94fe81";

        let currentCode = localStorage.getItem('weddingCode');

        window.onload = () => {
            createStars();
            if (currentCode) loadWedding(currentCode);
        };

        // פונקציית כניסה
        async function checkCode() {
            const code = document.getElementById('login-code').value.trim().toUpperCase();
            if(!code) return alert("נא להזין קוד");
            
            try {
                const doc = await db.collection("weddings").doc(code).get();
                if (doc.exists) {
                    localStorage.setItem('weddingCode', code);
                    location.reload();
                } else {
                    alert("הקוד לא קיים במערכת");
                }
            } catch (e) { alert("שגיאת תקשורת"); }
        }

        // טעינת נתוני החתונה של המשתמש הספציפי
        async function loadWedding(code) {
            try {
                const doc = await db.collection("weddings").doc(code).get();
                if (!doc.exists) return;
                const data = doc.data();

                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                document.getElementById('wedding-names').innerText = `${data.groom} & ${data.bride}`;
                document.getElementById('wedding-date-display').innerText = data.date.split('-').reverse().join(' . ');

                // הצגת תמונות בטרק
                const track = document.getElementById('track');
                const images = (data.images && data.images.length > 0) ? data.images : ['https://via.placeholder.com/220x150/111/d4af37?text=Add+Your+Photos'];
                
                track.innerHTML = "";
                images.forEach(url => {
                    const f = document.createElement('div');
                    f.className = 'frame';
                    f.innerHTML = `<img src="${url}">`;
                    track.appendChild(f);
                });
                if(images.length > 1) track.innerHTML += track.innerHTML; // הכפלה לאנימציה רציפה

                startCounter(data.date);
                updateGreeting();
            } catch (e) { console.error(e); }
        }

        // העלאה ל-ImgBB ושמירה ב-Firebase של המשתמש
        async function uploadToImgBB(input) {
            if (!input.files || !input.files[0]) return;
            
            const file = input.files[0];
            const btn = document.getElementById('upload-btn');
            const status = document.getElementById('upload-status');
            
            btn.disabled = true;
            status.innerText = "מעלה תמונה לשרת...";

            const formData = new FormData();
            formData.append("image", file);

            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: "POST",
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    const imageUrl = result.data.url;
                    await db.collection("weddings").doc(currentCode).update({
                        images: firebase.firestore.FieldValue.arrayUnion(imageUrl)
                    });
                    status.innerText = "התמונה נוספה בהצלחה!";
                    setTimeout(() => location.reload(), 1000);
                }
            } catch (err) {
                alert("העלאה נכשלה");
                btn.disabled = false;
            }
        }

        // מונה זמן מפורט
        function startCounter(targetStr) {
            const target = new Date(targetStr + "T19:00:00").getTime();
            const start = new Date("2026-02-24").getTime(); 

            const interval = setInterval(() => {
                const now = new Date().getTime();
                const diff = target - now;

                if (diff <= 0) {
                    clearInterval(interval);
                    document.getElementById('percent-text').innerText = "היום הגדול הגיע!";
                    return;
                }

                const secTotal = Math.floor(diff / 1000);
                const daysTotal = Math.floor(secTotal / 86400);
                
                document.getElementById('m-val').innerText = Math.floor(daysTotal / 30.44);
                document.getElementById('d-val').innerText = Math.floor(daysTotal % 30.44);
                document.getElementById('h-val').innerText = Math.floor((secTotal % 86400) / 3600);
                document.getElementById('min-val').innerText = Math.floor((secTotal % 3600) / 60);
                document.getElementById('sec-val').innerText = secTotal % 60;

                const progress = Math.min(((now - start) / (target - start)) * 100, 100).toFixed(4);
                document.getElementById('progress-bar').style.width = progress + "%";
                document.getElementById('percent-text').innerText = progress + "% מהציפייה כבר מאחורינו";
            }, 1000);
        }

        function createStars() {
            const container = document.getElementById('stars-layer');
            for(let i=0; i<100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2 + 'px';
                star.style.width = size; star.style.height = size;
                star.style.top = Math.random() * 100 + '%';
                star.style.left = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(star);
            }
        }

        function updateGreeting() {
            const h = new Date().getHours();
            let msg = "יום קסום";
            if(h >= 5 && h < 12) msg = "בוקר טוב";
            else if(h >= 12 && h < 18) msg = "צהריים טובים";
            else if(h >= 18 && h < 22) msg = "ערב טוב";
            else msg = "לילה טוב";
            document.getElementById('greeting-text').innerText = msg;
        }
    </script>
</body>
</html>
