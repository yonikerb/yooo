<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>חתונה</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #d4af37; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; }
        body {
            font-family: 'Assistant', sans-serif;
            margin: 0; padding: 0; background-color: var(--bg); color: white;
            overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh;
        }

        /* מסך כניסה */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 5000; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        #login-overlay input {
            padding: 15px; border-radius: 10px; border: 1px solid var(--gold);
            background: #111; color: white; margin: 10px; width: 250px; text-align: center;
            font-size: 1rem;
        }
        #login-overlay button {
            padding: 12px 30px; background: var(--gold); border: none; border-radius: 25px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        #login-overlay button:hover { opacity: 0.8; transform: scale(1.05); }

        /* תפריט צד */
        #side-menu {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(15px);
            z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 1px solid var(--gold); padding: 40px 25px;
        }
        #side-menu.open { right: 0; }
        #menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 1999; }
        .menu-link { display: block; color: white; text-decoration: none; font-size: 1.4rem; margin-bottom: 25px; padding-bottom: 10px; border-bottom: 1px solid rgba(212, 175, 55, 0.1); }

        #stars-layer { position: fixed; top: -50px; left: -50px; width: calc(100% + 100px); height: calc(100% + 100px); z-index: 1; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: twinkle var(--duration) infinite ease-in-out; }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }

        .film-strip {
            width: 100%; background: #000; padding: 25px 0; border-top: 1px solid rgba(212, 175, 55, 0.3);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3); position: relative; z-index: 5; overflow: hidden;
        }
        .film-track { display: flex; width: max-content; animation: slide 60s linear infinite; }
        .frame { width: 260px; height: 170px; margin: 0 10px; flex-shrink: 0; border-radius: 2px; overflow: hidden; }
        .frame img { width: 100%; height: 100%; object-fit: cover; }
        @keyframes slide { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; z-index: 10; }
        .hebrew-title { font-size: clamp(2.8rem, 12vw, 5.5rem); color: var(--gold); margin: 0; font-weight: 700; }
        .english-sub { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: rgba(212, 175, 55, 0.6); margin-top: 5px; }

        .counter-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 35px 0; }
        .unit { text-align: center; min-width: 85px; padding: 20px 10px; background: var(--glass); border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.1); }
        .unit .val { font-size: 2.5rem; font-weight: 700; display: block; }
        .unit .lbl { font-size: 0.7rem; color: var(--gold); }

        .progress-container { width: 300px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 20px; overflow: hidden; }
        #progress-bar { height: 100%; width: 0%; background: var(--gold); transition: 0.5s; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h2 style="color:var(--gold)">ברוכים הבאים</h2>
        <input type="text" id="login-code" placeholder="הכניסו קוד כניסה">
        <button onclick="checkCode()">כניסה</button>
    </div>

    <div id="menu-overlay" onclick="closeNav()"></div>
    <div id="side-menu">
        <nav>
            <a href="#" class="menu-link" onclick="closeNav()">דף הבית</a>
            <a href="#" class="menu-link" onclick="logout()">החלף משתמש / יציאה</a>
        </nav>
    </div>

    <div id="stars-layer"></div>

    <div id="main-content" style="display:none;">
        <div class="film-strip"><div class="film-track" id="track"></div></div>

        <div class="main">
            <div id="greeting-text" style="color:var(--gold); font-weight:bold; margin-bottom:10px;"></div>
            <h1 id="wedding-names" class="hebrew-title">טוען...</h1>
            <div id="wedding-date-display" class="english-sub"></div>
            
            <div class="counter-grid">
                <div class="unit"><span class="val" id="d-val">0</span><span class="lbl">ימים</span></div>
                <div class="unit"><span class="val" id="h-val">0</span><span class="lbl">שעות</span></div>
                <div class="unit"><span class="val" id="min-val">0</span><span class="lbl">דקות</span></div>
                <div class="unit"><span class="val" id="sec-val">0</span><span class="lbl">שניות</span></div>
            </div>

            <div class="progress-container"><div id="progress-bar"></div></div>
            <div id="percent-text" style="font-size: 0.8rem; color: #888; margin-top: 10px;"></div>
        </div>
    </div>

    <script>
        // 1. אתחול Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBIhLeaQnJ1HMxnEL0S4CLfMNyY7cfEfeA",
            authDomain: "chatunot-b63ec.firebaseapp.com",
            projectId: "chatunot-b63ec",
            storageBucket: "chatunot-b63ec.firebasestorage.app",
            messagingSenderId: "1057494918141",
            appId: "1:1057494918141:web:6d03f8007c894e463a6f94"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentCode = localStorage.getItem('weddingCode');

        window.onload = () => {
            createBackground();
            if (currentCode) {
                loadWedding(currentCode);
            }
        };

        async function checkCode() {
            const codeInput = document.getElementById('login-code');
            const code = codeInput.value.trim().toUpperCase();
            if(!code) return alert("נא להזין קוד");
            
            try {
                const doc = await db.collection("weddings").doc(code).get();
                if (doc.exists) {
                    localStorage.setItem('weddingCode', code);
                    location.reload();
                } else {
                    alert("הקוד לא נמצא במערכת");
                }
            } catch (e) { 
                console.error("Firebase Error:", e);
                alert("שגיאת תקשורת"); 
            }
        }

        async function loadWedding(code) {
            try {
                const doc = await db.collection("weddings").doc(code).get();
                if(!doc.exists) return;
                const data = doc.data();

                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('wedding-names').innerText = `${data.groom} & ${data.bride}`;
                document.getElementById('wedding-date-display').innerText = data.date.split('-').reverse().join(' . ');

                // טעינת תמונות
                const track = document.getElementById('track');
                if(data.images && data.images.length > 0) {
                    track.innerHTML = ""; // ניקוי לפני טעינה
                    data.images.forEach(url => {
                        const f = document.createElement('div');
                        f.className = 'frame';
                        f.innerHTML = `<img src="${url}">`;
                        track.appendChild(f);
                    });
                    track.innerHTML += track.innerHTML; // הכפלה לאנימציה רציפה
                }

                startCounter(data.date);
                updateGreeting();
            } catch (e) {
                console.error("Error loading wedding data:", e);
            }
        }

        function startCounter(dateStr) {
            const target = new Date(dateStr + "T19:00:00").getTime();
            // שיניתי את התאריך בהתאם להודעה שלך על הצעת הנישואין ב-24/02
            const start = new Date("2026-02-24").getTime(); 

            setInterval(() => {
                const now = new Date().getTime();
                const diff = target - now;
                
                if (diff > 0) {
                    document.getElementById('d-val').innerText = Math.floor(diff / 86400000);
                    document.getElementById('h-val').innerText = Math.floor((diff % 86400000) / 3600000);
                    document.getElementById('min-val').innerText = Math.floor((diff % 3600000) / 60000);
                    document.getElementById('sec-val').innerText = Math.floor((diff % 60000) / 1000);

                    const total = target - start;
                    const progress = Math.min(((now - start) / total * 100), 100).toFixed(4);
                    document.getElementById('progress-bar').style.width = progress + "%";
                    document.getElementById('percent-text').innerText = `${progress}% מהציפייה מאחורינו`;
                } else {
                    document.getElementById('percent-text').innerText = "היום הגדול הגיע!";
                    document.getElementById('progress-bar').style.width = "100%";
                }
            }, 1000);
        }

        function createBackground() {
            const layer = document.getElementById('stars-layer');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const s = (Math.random() * 2 + 1) + 'px';
                star.style.width = s; star.style.height = s;
                star.style.top = Math.random() * 100 + '%';
                star.style.left = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                layer.appendChild(star);
            }
        }

        function updateGreeting() {
            const hour = new Date().getHours();
            let text = "יום קסום";
            if (hour >= 5 && hour < 12) text = "בוקר טוב";
            else if (hour >= 12 && hour < 17) text = "צהריים טובים";
            else if (hour >= 17 && hour < 21) text = "ערב טוב";
            else text = "לילה טוב";
            document.getElementById('greeting-text').innerText = text;
        }

        function logout() { localStorage.removeItem('weddingCode'); location.reload(); }
        function openNav() { document.getElementById('side-menu').classList.add('open'); document.getElementById('menu-overlay').style.display='block'; }
        function closeNav() { document.getElementById('side-menu').classList.remove('open'); document.getElementById('menu-overlay').style.display='none'; }
    </script>
</body>
</html>
