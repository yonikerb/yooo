<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>חתונה</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-classic.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-classic.js"></script>

    <style>
        :root { --gold: #d4af37; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; }
        body {
            font-family: 'Assistant', sans-serif;
            margin: 0; padding: 0; background-color: var(--bg); color: white;
            overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh;
        }

        /* תפריט צד */
        #side-menu {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(15px);
            z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 1px solid var(--gold); padding: 40px 25px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.8);
        }
        #side-menu.open { right: 0; }
        #menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; z-index: 1999;
        }
        .menu-link {
            display: block; color: white; text-decoration: none; font-size: 1.4rem;
            margin-bottom: 25px; padding-bottom: 10px; border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            transition: 0.3s;
        }

        #stars-layer { position: fixed; top: -50px; left: -50px; width: calc(100% + 100px); height: calc(100% + 100px); z-index: 1; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: twinkle var(--duration) infinite ease-in-out; }
        
        @keyframes twinkle { 0%, 100% { opacity: 0; } 50% { opacity: 0.5; } }

        .film-strip {
            width: 100%; background: #000; padding: 25px 0;
            border-top: 1px solid rgba(212, 175, 55, 0.3); border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            position: relative; z-index: 5; overflow: hidden;
        }
        .film-track { display: flex; width: max-content; animation: slide linear infinite; padding: 15px 0; }
        .frame { width: 260px; height: 170px; margin: 0 10px; flex-shrink: 0; border-radius: 2px; overflow: hidden; }
        .frame img { width: 100%; height: 100%; object-fit: cover; }
        @keyframes slide { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; z-index: 10; }
        .hebrew-title { font-size: clamp(2.8rem, 12vw, 5.5rem); color: var(--gold); margin: 0; font-weight: 700; }
        .english-sub { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: rgba(212, 175, 55, 0.6); }

        .counter-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 35px 0; }
        .unit { text-align: center; min-width: 85px; padding: 20px 10px; background: var(--glass); border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.1); }
        .unit .val { font-size: 2.5rem; font-weight: 700; display: block; }
        .unit .lbl { font-size: 0.7rem; color: var(--gold); }

        /* מסך כניסה */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 5000; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        #login-overlay input {
            padding: 15px; border-radius: 10px; border: 1px solid var(--gold);
            background: #111; color: white; margin: 10px; width: 250px; text-align: center;
        }
        #login-overlay button {
            padding: 12px 30px; background: var(--gold); border: none; border-radius: 25px;
            font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h2 style="color:var(--gold)">ברוכים הבאים</h2>
        <input type="text" id="login-code" placeholder="הכניסו קוד כניסה">
        <button onclick="checkCode()">כניסה</button>
    </div>

    <div id="menu-overlay"></div>
    <div id="side-menu">
        <nav>
            <a href="#" class="menu-link" onclick="closeNav()">דף הבית</a>
            <a href="#" class="menu-link" onclick="logout()">יציאה</a>
        </nav>
    </div>

    <div id="stars-layer"></div>

    <div id="main-content" style="display:none;">
        <div class="film-strip">
            <div class="film-track" id="track"></div>
        </div>

        <div class="main">
            <div id="greeting-text" style="color:var(--gold); font-weight:bold; margin-bottom:10px;"></div>
            <h1 id="groom-bride-names" class="hebrew-title">טוען...</h1>
            <div id="wedding-date-display" class="english-sub"></div>
            
            <div class="counter-grid">
                <div class="unit"><span class="val" id="d-val">0</span><span class="lbl">ימים</span></div>
                <div class="unit"><span class="val" id="h-val">0</span><span class="lbl">שעות</span></div>
                <div class="unit"><span class="val" id="min-val">0</span><span class="lbl">דקות</span></div>
                <div class="unit"><span class="val" id="sec-val">0</span><span class="lbl">שניות</span></div>
            </div>
        </div>
    </div>

    <script>
        // 1. אתחול Firebase קודם כל
        const firebaseConfig = {
            apiKey: "AIzaSyBIhLeaQnJ1HMxnEL0S4CLfMNyY7cfEfeA",
            authDomain: "chatunot-b63ec.firebaseapp.com",
            projectId: "chatunot-b63ec",
            storageBucket: "chatunot-b63ec.firebasestorage.app",
            messagingSenderId: "1057494918141",
            appId: "1:1057494918141:web:6d03f8007c894e463a6f94"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentWeddingCode = localStorage.getItem('weddingCode');

        window.onload = () => {
            createBackground();
            if (currentWeddingCode) {
                loadWedding(currentWeddingCode);
            }
        };

        async function checkCode() {
            const code = document.getElementById('login-code').value.trim().toUpperCase();
            const doc = await db.collection("weddings").doc(code).get();
            if (doc.exists) {
                localStorage.setItem('weddingCode', code);
                location.reload();
            } else {
                alert("קוד לא נמצא");
            }
        }

        async function loadWedding(code) {
            const doc = await db.collection("weddings").doc(code).get();
            const data = doc.data();
            
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('groom-bride-names').innerText = `${data.groom} & ${data.bride}`;
            document.getElementById('wedding-date-display').innerText = data.date.split('-').reverse().join(' . ');

            // טעינת תמונות ל-Film Strip
            const track = document.getElementById('track');
            if(data.images && data.images.length > 0) {
                data.images.forEach(url => {
                    const f = document.createElement('div');
                    f.className = 'frame';
                    f.innerHTML = `<img src="${url}">`;
                    track.appendChild(f);
                });
                // הכפלה לאנימציה חלקה
                track.innerHTML += track.innerHTML;
                track.style.animationDuration = (data.images.length * 5) + 's';
            }

            startCounter(data.date);
            updateGreeting();
        }

        function startCounter(dateStr) {
            const target = new Date(dateStr + "T19:30:00").getTime();
            setInterval(() => {
                const now = new Date().getTime();
                const diff = target - now;
                if (diff > 0) {
                    document.getElementById('d-val').innerText = Math.floor(diff / 86400000);
                    document.getElementById('h-val').innerText = Math.floor((diff % 86400000) / 3600000);
                    document.getElementById('min-val').innerText = Math.floor((diff % 3600000) / 60000);
                    document.getElementById('sec-val').innerText = Math.floor((diff % 60000) / 1000);
                }
            }, 1000);
        }

        function updateGreeting() {
            const hour = new Date().getHours();
            let text = "יום קסום";
            if (hour >= 5 && hour < 12) text = "בוקר טוב";
            else if (hour >= 12 && hour < 17) text = "צהריים טובים";
            else if (hour >= 17 && hour < 21) text = "ערב טוב";
            else text = "לילה טוב";
            document.getElementById('greeting-text').innerText = text;
        }

        function createBackground() {
            const layer = document.getElementById('stars-layer');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const s = Math.random() * 2 + 'px';
                star.style.width = s; star.style.height = s;
                star.style.top = Math.random() * 100 + '%';
                star.style.left = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                layer.appendChild(star);
            }
        }

        function logout() {
            localStorage.removeItem('weddingCode');
            location.reload();
        }
    </script>
</body>
</html>
