<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>החתונה שלנו</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #d4af37; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Assistant', sans-serif;
            margin: 0; padding: 0; background-color: var(--bg); color: white;
            overflow: hidden; display: flex; flex-direction: column; height: 100vh;
        }

        /* סרט פילם - שיפור אנימציה */
        .film-strip {
            width: 100%; background: #000; padding: 25px 0;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            position: relative; z-index: 5; overflow: hidden;
            mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
        }
        
        .film-track { 
            display: flex; 
            width: max-content; 
            animation: slide 40s linear infinite;
            will-change: transform;
        }
        
        .frame { width: 240px; height: 160px; margin: 0 10px; flex-shrink: 0; border-radius: 4px; overflow: hidden; border: 1px solid rgba(212, 175, 55, 0.1); }
        .frame img { width: 100%; height: 100%; object-fit: cover; }
        
        /* לופ אינסופי חלק */
        @keyframes slide {
            from { transform: translateX(0); }
            to { transform: translateX(calc(-50%)); }
        }

        /* הזזת המלל למעלה */
        .main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; z-index: 10; transform: translateY(-30px); }
        
        .hebrew-date { font-size: clamp(2.5rem, 10vw, 5rem); color: var(--gold); margin: 0; font-weight: 700; text-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        
        /* עיצוב לועזי משודרג */
        .english-date { 
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem; 
            color: var(--gold); 
            margin-top: 5px; 
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .counter-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin: 25px 0; }
        .unit { 
            text-align: center; min-width: 75px; padding: 12px 5px; 
            background: var(--glass); border-radius: 12px; border: 1px solid rgba(212, 175, 55, 0.15); 
            backdrop-filter: blur(10px);
        }
        .unit .val { font-size: 2.2rem; font-weight: 700; display: block; line-height: 1; }
        .unit .lbl { font-size: 0.75rem; color: var(--gold); font-weight: bold; }

        /* פס התקדמות */
        .progress-container {
            width: 80%; max-width: 500px; margin-top: 20px; text-align: center;
        }
        .progress-bar-bg {
            width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 10px; overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%; background: linear-gradient(90deg, transparent, var(--gold)); width: 0%; transition: width 1s ease-out;
        }
        .progress-text { font-size: 0.9rem; color: var(--gold); font-weight: bold; }

        #stars-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--d) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #login-overlay input { padding: 15px; border-radius: 12px; border: 1px solid var(--gold); background: #111; color: white; margin-bottom: 15px; width: 260px; text-align: center; font-size: 1.1rem; }
        #login-overlay button { padding: 12px 40px; background: var(--gold); border: none; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h2 style="color:var(--gold)">כניסה לאירוע</h2>
        <input type="text" id="login-code" placeholder="הכניסו קוד">
        <button onclick="checkCode()">כניסה</button>
    </div>

    <div id="stars-layer"></div>

    <div id="main-content" style="display:none; height: 100%; flex-direction: column;">
        <div class="film-strip"><div class="film-track" id="track"></div></div>

        <div class="main">
            <div id="greeting-text" style="color:var(--gold); font-size: 1.3rem; margin-bottom: 10px; font-weight: bold;"></div>
            <h1 id="hebrew-date-display" class="hebrew-date">טוען...</h1>
            <div id="english-date-display" class="english-date"></div>
            
            <div class="counter-grid">
                <div class="unit"><span class="val" id="m-val">0</span><span class="lbl">חודשים</span></div>
                <div class="unit"><span class="val" id="d-val">0</span><span class="lbl">ימים</span></div>
                <div class="unit"><span class="val" id="h-val">0</span><span class="lbl">שעות</span></div>
                <div class="unit"><span class="val" id="min-val">0</span><span class="lbl">דקות</span></div>
                <div class="unit"><span class="val" id="sec-val">0</span><span class="lbl">שניות</span></div>
            </div>

            <div class="progress-container">
                <div class="progress-text" id="progress-desc">מחשב התקדמות...</div>
                <div class="progress-bar-bg">
                    <div id="progress-fill" class="progress-bar-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBIhLeaQnJ1HMxnEL0S4CLfMNyY7cfEfeA",
            authDomain: "chatunot-b63ec.firebaseapp.com",
            projectId: "chatunot-b63ec",
            storageBucket: "chatunot-b63ec.firebasestorage.app",
            messagingSenderId: "1057494918141",
            appId: "1:1057494918141:web:6d03f8007c894e463a6f94"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentCode = localStorage.getItem('weddingCode');

        window.onload = () => {
            createStars();
            if (currentCode) loadWedding(currentCode);
        };

        async function checkCode() {
            const code = document.getElementById('login-code').value.trim().toUpperCase();
            const doc = await db.collection("weddings").doc(code).get();
            if (doc.exists) {
                localStorage.setItem('weddingCode', code);
                location.reload();
            } else { alert("קוד שגוי"); }
        }

        // פונקציה לניקוי ניקוד
        function removeNikud(text) {
            return text.replace(/[\u0591-\u05C7]/g, "");
        }

        async function getHebrewDate(dateStr) {
            try {
                const [year, month, day] = dateStr.split('-');
                const response = await fetch(`https://www.hebcal.com/converter?cfg=json&gy=${year}&gm=${month}&gd=${day}&g2h=1`);
                const data = await response.json();
                return removeNikud(data.hebrew);
            } catch (e) { return ""; }
        }

        async function loadWedding(code) {
            const doc = await db.collection("weddings").doc(code).get();
            if (!doc.exists) return;
            const data = doc.data();

            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
            
            const hebDate = await getHebrewDate(data.date);
            document.getElementById('hebrew-date-display').innerText = hebDate;
            document.getElementById('english-date-display').innerText = data.date.split('-').reverse().join(' . ');

            // לופ תמונות אינסופי וחלק
            const track = document.getElementById('track');
            let imgs = data.images || [];
            if(imgs.length === 0) imgs = ['https://via.placeholder.com/240x160/111/d4af37?text=No+Images'];
            
            // הכפלת התמונות ליצירת רצף
            const buildTrack = () => {
                const combinedImgs = [...imgs, ...imgs, ...imgs, ...imgs]; // מבטיח מספיק תוכן ללופ
                track.innerHTML = combinedImgs.map(url => `<div class="frame"><img src="${url}"></div>`).join('');
            };
            buildTrack();

            startCounter(data.date);
            updateGreeting();
        }

        function startCounter(dateStr) {
            const target = new Date(dateStr + "T19:30:00").getTime();
            
            // לצורך פס ההתקדמות - נניח שהספירה החלה חצי שנה לפני (או תאריך יצירה אם היה לנו)
            const startDate = new Date(new Date(dateStr).getTime() - (180 * 24 * 60 * 60 * 1000)).getTime();

            setInterval(() => {
                const now = new Date().getTime();
                const diff = target - now;
                
                if (diff > 0) {
                    const days = Math.floor(diff / 86400000);
                    document.getElementById('m-val').innerText = Math.floor(days / 30.44);
                    document.getElementById('d-val').innerText = Math.floor(days % 30.44);
                    document.getElementById('h-val').innerText = Math.floor((diff % 86400000) / 3600000);
                    document.getElementById('min-val').innerText = Math.floor((diff % 3600000) / 60000);
                    document.getElementById('sec-val').innerText = Math.floor((diff % 60000) / 1000);

                    // חישוב פס התקדמות
                    const totalDuration = target - startDate;
                    const elapsed = now - startDate;
                    const progress = Math.min(Math.max((elapsed / totalDuration) * 100, 0), 100);
                    document.getElementById('progress-fill').style.width = progress + "%";
                    document.getElementById('progress-desc').innerText = `עברנו כבר ${progress.toFixed(1)}% מהדרך לחתונה!`;
                } else {
                    document.getElementById('progress-desc').innerText = "היום הגדול הגיע!";
                    document.getElementById('progress-fill').style.width = "100%";
                }
            }, 1000);
        }

        function createStars() {
            const container = document.getElementById('stars-layer');
            for(let i=0; i<120; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2 + 1 + 'px';
                star.style.width = star.style.height = size;
                star.style.top = Math.random() * 100 + '%';
                star.style.left = Math.random() * 100 + '%';
                star.style.setProperty('--d', Math.random() * 3 + 2 + 's');
                container.appendChild(star);
            }
        }

        function updateGreeting() {
            const h = new Date().getHours();
            let msg = "צהריים טובים";
            if(h<12) msg="בוקר טוב"; else if(h>=17 && h<21) msg="ערב טוב"; else if(h>=21 || h<5) msg="לילה טוב";
            document.getElementById('greeting-text').innerText = msg;
        }
    </script>
</body>
</html>
