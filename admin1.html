<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול מערכת חתונות</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-classic.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-classic.js"></script>

    <style>
        body { background: #0a0a0a; color: white; font-family: 'Assistant', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 1px solid #d4af37; box-shadow: 0 0 20px rgba(212,175,55,0.1); width: 350px; }
        input { display: block; margin: 15px 0; padding: 12px; width: 100%; background: #222; border: 1px solid #444; color: white; border-radius: 8px; text-align: center; font-size: 1rem; }
        button { width: 100%; padding: 15px; background: #d4af37; border: none; cursor: pointer; font-weight: bold; border-radius: 8px; font-size: 1.1rem; transition: 0.3s; color: #000; }
        button:hover { background: #f1c40f; transform: scale(1.02); }
        .status-msg { margin-top: 15px; font-size: 0.9rem; text-align: center; min-height: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h1 style="color:#d4af37; margin-top:0; text-align:center;">יצירת זוג חדש</h1>
        <input type="text" id="groom" placeholder="שם החתן">
        <input type="text" id="bride" placeholder="שם הכלה">
        <input type="date" id="date">
        <input type="text" id="custom-code" placeholder="קוד כניסה (למשל: 053249)">
        <button id="submit-btn" onclick="createNewWedding()">צור חתונה וקוד</button>
        <div id="status" class="status-msg"></div>
    </div>

    <script>
        // 2. הגדרות הפרויקט שלך
        const firebaseConfig = {
            apiKey: "AIzaSyBIhLeaQnJ1HMxnEL0S4CLfMNyY7cfEfeA",
            authDomain: "chatunot-b63ec.firebaseapp.com",
            projectId: "chatunot-b63ec",
            storageBucket: "chatunot-b63ec.firebasestorage.app",
            messagingSenderId: "1057494918141",
            appId: "1:1057494918141:web:6d03f8007c894e463a6f94"
        };

        // 3. אתחול Firebase והגדרת המשתנה db מיד בטעינה
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 4. הפונקציה ליצירת החתונה
        async function createNewWedding() {
            const groom = document.getElementById('groom').value;
            const bride = document.getElementById('bride').value;
            const date = document.getElementById('date').value;
            const code = document.getElementById('custom-code').value.trim().toUpperCase();
            const status = document.getElementById('status');
            const btn = document.getElementById('submit-btn');

            if(!groom || !bride || !date || !code) {
                alert("נא למלא את כל השדות");
                return;
            }

            btn.disabled = true;
            btn.innerText = "שומר...";
            status.innerText = "";

            try {
                // הוספת הזוג למסד הנתונים - כאן db כבר מאותחל בוודאות
                await db.collection("weddings").doc(code).set({
                    groom: groom,
                    bride: bride,
                    date: date,
                    images: [] 
                });
                
                status.style.color = "#2ecc71";
                status.innerText = "הצלחה! הקוד נוצר: " + code;
                
                // איפוס שדות
                document.getElementById('groom').value = "";
                document.getElementById('bride').value = "";
                document.getElementById('custom-code').value = "";
            } catch (error) {
                console.error("Error:", error);
                status.style.color = "#e74c3c";
                status.innerText = "שגיאה: " + error.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "צור חתונה וקוד";
            }
        }
    </script>
</body>
</html>
